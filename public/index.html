<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>JWT httpOnly + Roles Demo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; }
    .box { border: 1px solid #ddd; padding: 16px; margin-bottom: 12px; border-radius: 6px; }
    input, select { padding: 8px; margin: 6px 0; width: 100%; box-sizing: border-box; }
    button { padding: 8px 12px; margin-right: 6px; }
    pre { background: #f7f7f7; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h1>JWT httpOnly + Roles Demo</h1>

  <div class="box">
    <h3>Login</h3>
    <label>Usuario (use: admin, vendedor, comprador)</label>
    <input id="username" value="admin" />
    <label>Senha (password123)</label>
    <input id="password" type="password" value="password123" />
    <button id="loginBtn">Login</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="box">
    <h3>Chamadas</h3>
    <button data-endpoint="/public" class="callBtn">Public</button>
    <button data-endpoint="/auth/profile" class="callBtn">Profile (autenticado)</button>
    <button data-endpoint="/users" class="callBtn">Users (Admin only)</button>
  </div>

  <div class="box">
    <h3>Resposta</h3>
    <pre id="output">Nenhuma ação ainda.</pre>
  </div>

  <script>
    const API = 'http://localhost:3000'
    const output = document.getElementById('output')

    function show(obj) {
      output.textContent = JSON.stringify(obj, null, 2)
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      const data = await res.json()
      show({ status: res.status, data })
    })

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const res = await fetch(API + '/auth/logout', {
        method: 'POST',
        credentials: 'include'
      })
      const data = await res.json()
      show({ status: res.status, data })
    })

    document.querySelectorAll('.callBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const endpoint = btn.getAttribute('data-endpoint')
        const res = await fetch(API + endpoint, {
          method: 'GET',
          credentials: 'include'
        })
        const text = await res.text()
        let parsed
        try { parsed = JSON.parse(text) } catch(e) { parsed = text }
        show({ status: res.status, body: parsed })
      })
    })
  </script>
</body>
</html>
